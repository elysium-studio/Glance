name: Release build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: WinUI managed publish (x64)
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Configure private Elysium feed
        shell: pwsh
        env:
          ELYSIUM_PACKAGES_TOKEN: ${{ secrets.ELYSIUM_PACKAGES_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $token = if ([string]::IsNullOrWhiteSpace($env:ELYSIUM_PACKAGES_TOKEN)) {
            $env:GITHUB_TOKEN
          }
          else {
            $env:ELYSIUM_PACKAGES_TOKEN
          }

          dotnet nuget update source "Elysium Studio" `
            --username $env:GITHUB_REPOSITORY_OWNER `
            --password $token `
            --store-password-in-clear-text `
            --configfile NuGet.config

      - name: Publish application
        shell: pwsh
        run: |
          dotnet publish Glance.Shell.WinUI/Glance.Shell.WinUI.csproj `
            --configuration Release `
            --runtime win-x64 `
            --output artifacts/release `
            --self-contained true `
            --property:Platform=x64 `
            --property:PublishAot=false `
            --property:PublishTrimmed=false `
            --property:DebugType=None `
            --property:DebugSymbols=false `
            --property:StripSymbols=true `
            --warnaserror

      - name: Verify release output
        shell: pwsh
        run: |
          $requiredFiles = @(
            "artifacts/release/Glance.exe",
            "artifacts/release/Glance.dll",
            "artifacts/release/Glance.pri",
            "artifacts/release/Glance.UI.WinUI.dll",
            "artifacts/release/Glance.UI.WinUI.pri",
            "artifacts/release/App.xbf",
            "artifacts/release/Microsoft.WindowsAppRuntime.Insights.Resource.dll"
          )

          foreach ($requiredFile in $requiredFiles) {
            if (-not (Test-Path -LiteralPath $requiredFile -PathType Leaf)) {
              throw "Managed publish did not produce $requiredFile"
            }
          }

          $requiredModules = @{
            AudioSwitcher = @("Glance.AudioSwitcher.dll", "Glance.AudioSwitcher.WinUI.dll", "Glance.AudioSwitcher.WinUI.pri")
            Clipboard = @("Glance.Clipboard.dll", "Glance.Clipboard.WinUI.dll", "Glance.Clipboard.WinUI.pri")
            ColorPicker = @("Glance.ColorPicker.dll", "Glance.ColorPicker.WinUI.dll", "Glance.ColorPicker.WinUI.pri")
            DevicePresence = @("Glance.DevicePresence.dll", "Glance.DevicePresence.WinUI.dll", "Glance.DevicePresence.WinUI.pri")
            DropShelf = @("Glance.DropShelf.dll", "Glance.DropShelf.WinUI.dll", "Glance.DropShelf.WinUI.pri")
            FocusSession = @("Glance.FocusSession.dll", "Glance.FocusSession.WinUI.dll", "Glance.FocusSession.WinUI.pri")
            Media = @("Glance.Media.dll", "Glance.Media.WinUI.dll", "Glance.Media.WinUI.pri")
            Power = @("Glance.Power.dll", "Glance.Power.WinUI.dll", "Glance.Power.WinUI.pri")
            PrivacyControls = @("Glance.PrivacyControls.dll", "Glance.PrivacyControls.WinUI.dll", "Glance.PrivacyControls.WinUI.pri")
            RemovableDevices = @("Glance.RemovableDevices.dll", "Glance.RemovableDevices.WinUI.dll", "Glance.RemovableDevices.WinUI.pri")
            ScreenCapture = @("Glance.ScreenCapture.dll", "Glance.ScreenCapture.WinUI.dll", "Glance.ScreenCapture.WinUI.pri")
            Stopwatch = @("Glance.Stopwatch.dll", "Glance.Stopwatch.WinUI.dll", "Glance.Stopwatch.WinUI.pri")
            SystemMonitor = @("Glance.SystemMonitor.dll", "Glance.SystemMonitor.WinUI.dll", "Glance.SystemMonitor.WinUI.pri")
            Timer = @("Glance.Timer.dll", "Glance.Timer.WinUI.dll", "Glance.Timer.WinUI.pri")
            VoiceNotes = @("Glance.VoiceNotes.dll", "Glance.VoiceNotes.WinUI.dll", "Glance.VoiceNotes.WinUI.pri")
          }

          foreach ($module in $requiredModules.GetEnumerator()) {
            foreach ($requiredFile in $module.Value) {
              $modulePath = Join-Path "artifacts/release/Modules/$($module.Key)" $requiredFile

              if (-not (Test-Path -LiteralPath $modulePath -PathType Leaf)) {
                throw "Managed publish did not include Modules/$($module.Key)/$requiredFile"
              }
            }
          }

          $flattenedModules = @(Get-ChildItem "artifacts/release" -File | Where-Object { $_.Name -match '^Glance\..+\.WinUI\.(dll|pri)$' })

          if ($flattenedModules.Count -gt 0) {
            throw "Module files were left in the application root: $($flattenedModules.Name -join ', ')"
          }
